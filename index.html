<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bafão no SESI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #0d1b2a 0%, #010811 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            user-select: none;
        }

        /* TELA DE INTRODUÇÃO PROFISSONAL */
        #intro-israel {
            position: absolute; width: 100%; height: 100%;
            background: #000; z-index: 300;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .intro-texto {
            font-size: 2.2rem; font-weight: 900; color: #fff;
            text-transform: uppercase; letter-spacing: 4px; text-align: center;
            animation: brilhoIntro 2s ease-in-out infinite alternate;
        }
        .intro-sub {
            font-size: 1.4rem; color: #0066cc; font-weight: 600; margin-top: 10px;
            letter-spacing: 6px; text-transform: uppercase;
        }
        @keyframes brilhoIntro {
            0% { text-shadow: 0 0 10px rgba(0, 102, 204, 0.5); transform: scale(0.98); }
            100% { text-shadow: 0 0 30px rgba(0, 102, 204, 1), 0 0 50px #00e5ff; transform: scale(1.02); }
        }

        /* TELA DE MENU INICIAL */
        #menu-inicial {
            position: absolute; width: 100%; height: 100%;
            background: rgba(1, 8, 17, 0.96); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; transition: opacity 0.5s ease; overflow-y: auto; padding: 20px 0;
        }

        #menu-inicial h1 {
            font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
            font-weight: 900; color: #0066cc;
            text-shadow: 0px 4px 15px rgba(0, 102, 204, 0.4);
        }

        .secao-menu { margin: 12px 0; text-align: center; width: 90%; max-width: 650px; }
        .secao-menu label { display: block; font-size: 0.9rem; color: #8da9c4; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }

        /* Sub-painéis dinâmicos */
        .painel-dinamico {
            display: none;
            background: rgba(11, 19, 43, 0.6);
            padding: 18px;
            border-radius: 10px;
            border: 1px dashed #0066cc;
            margin-top: 15px;
            animation: fadeIn 0.3s ease forwards;
        }

        .grid-temas {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            max-height: 150px; overflow-y: auto; background: #0b132b;
            padding: 12px; border-radius: 8px; border: 2px solid #0066cc;
        }

        @media (max-width: 600px) { .grid-temas { grid-template-columns: repeat(2, 1fr); } }

        .btn-principal {
            width: 260px; padding: 16px; margin: 8px; font-size: 1.1rem; font-weight: bold; color: white;
            border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-bot { background: linear-gradient(135deg, #e63946, #b5179e); }
        .btn-p2 { background: linear-gradient(135deg, #0066cc, #00f5ff); }
        .btn-principal:hover { transform: scale(1.04); filter: brightness(1.1); box-shadow: 0 6px 15px rgba(0,102,204,0.4); }

        .btn-config {
            padding: 8px 14px; font-size: 0.85rem; background: #1c2541; color: #fff;
            border: 1px solid #3a506b; border-radius: 5px; cursor: pointer; transition: all 0.2s;
            margin: 3px;
        }
        .btn-config.ativo { border-color: #00e5ff; background: #0066cc; color: #fff; font-weight: bold; box-shadow: 0 0 10px rgba(0,102,204,0.5); }

        /* Form de nomes customizados */
        .container-inputs {
            display: flex; flex-direction: column; gap: 8px; align-items: center; margin: 12px 0;
        }
        .input-nome {
            width: 220px; padding: 8px 12px; border-radius: 6px; border: 1px solid #3a506b;
            background: #0b132b; color: white; font-weight: 600; text-align: center; outline: none;
        }
        .input-nome:focus { border-color: #00e5ff; box-shadow: 0 0 8px rgba(0,229,255,0.4); }

        .btn-jogar-final {
            background: #2ed573; color: white; border: none; padding: 12px 40px; font-size: 1.1rem;
            font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; transition: transform 0.2s;
            box-shadow: 0 4px 12px rgba(46, 213, 115, 0.3);
        }
        .btn-jogar-final:hover { transform: scale(1.05); background: #26af5f; }

        /* PAINEL DE STATUS E PLACAR */
        #status-painel { position: absolute; top: 15px; text-align: center; z-index: 100; color: white; width: 100%; pointer-events: none; }
        #vez-indicador { font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #0066cc; text-shadow: 0 2px 10px rgba(0,0,0,0.8); margin-bottom: 5px; }
        #placar { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; font-size: 1.2rem; margin-bottom: 8px; font-weight: 700; text-shadow: 0 2px 5px #000; padding: 0 10px; }
        
        .p-cor-1 { color: #00e5ff; }
        .p-cor-2 { color: #e63946; }
        .p-cor-3 { color: #ffb703; }
        .p-cor-4 { color: #2ed573; }
        
        #log-acao { font-size: 1.1rem; color: #fff; min-height: 28px; background: rgba(11, 19, 43, 0.8); display: inline-block; padding: 6px 24px; border-radius: 20px; border: 1px solid #0066cc; }

        /* BOLO DE CARTAS */
        #bolo-de-cartas { width: 185px; height: 255px; position: relative; transform-style: preserve-3d; margin-top: 55px; }
        .carta-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.5s; }
        .face { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 12px; border: 2px solid #fff; display: flex; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.7); }
        
        .frente { background-color: #0b132b; background-size: cover; background-position: center; background-repeat: no-repeat; }
        .verso { background: linear-gradient(135deg, #cc1111, #660000); transform: rotateY(180deg); display: flex; justify-content: center; align-items: center; border-color: #ffb703; }
        .verso::after { content: "⚡"; font-size: 3.5rem; font-weight: 900; color: #ffb703; text-shadow: 3px 3px 0px #000; }

        .carta-container.jogada { transform: translateZ(400px) translateY(-250px) rotateY(180deg) scale(0) !important; opacity: 0; pointer-events: none; }

        /* POP-UP DE CAPTURA GRANDE NA TELA */
        #popup-carta-ganha {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            z-index: 180; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.85); pointer-events: none;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #popup-carta-ganha.mostrar { opacity: 1; }
        
        .pop-card-moldura {
            width: 230px; height: 320px; border-radius: 14px; border: 4px solid #00e5ff;
            background-color: #0b132b; background-size: cover; background-position: center; background-repeat: no-repeat;
            box-shadow: 0 0 35px #0066cc; transform: scale(0.4) rotate(-10deg); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #popup-carta-ganha.mostrar .pop-card-moldura { transform: scale(1.1) rotate(0deg); }

        .pop-texto-alerta {
            margin-top: 25px; font-size: 1.6rem; font-weight: 900; color: #fff;
            text-align: center; width: 85%; max-width: 550px; text-transform: uppercase;
            text-shadow: 0 4px 12px #000; letter-spacing: 1px;
            transform: translateY(20px); transition: transform 0.4s ease;
        }
        #popup-carta-ganha.mostrar .pop-texto-alerta { transform: translateY(0); }

        /* BARRINHA DE PRECISÃO CORRIGIDA PARA MAIOR CHANCE */
        #container-barra { width: 320px; height: 24px; background: #0b132b; margin-top: 45px; border-radius: 12px; position: relative; border: 2px solid #0066cc; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.6); z-index: 110; }
        #layout-barra { width: 100%; height: 100%; display: flex; }
        .zona-vermelha { width: 20%; background: #e63946; } /* Reduzida a falha */
        .zona-amarela  { width: 18%; background: #ffb703; }
        .zona-verde    { width: 10%;  background: #2ed573; } /* Dobrada de tamanho */
        .zona-roxa     { width: 4%;  background: #bd00ff; }  /* Aumentada para facilitar acerto crítico */
        #bolinha-alvo { width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 0%; box-shadow: 0 0 10px #fff, 0 0 20px #00e5ff; }

        #instrucao { position: absolute; bottom: 20px; color: #8da9c4; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; pointer-events: none; font-weight: 600; }

        /* ANIMATION */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .confete { position: absolute; width: 10px; height: 10px; z-index: 150; opacity: 0.9; border-radius: 50%; pointer-events: none; animation: cair 3s linear forwards; }
        @keyframes cair { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        #efeito-derrota { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 160; display: flex; justify-content: center; align-items: center; background: rgba(1,8,17,0.7); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #efeito-derrota.ativo { opacity: 1; }
        .deslike-mao { font-size: 10rem; filter: drop-shadow(0 0 25px #e63946); animation: tremer 0.4s infinite alternate; }
        @keyframes tremer { 0% { transform: scale(1) rotate(-6deg); } 100% { transform: scale(1.1) rotate(6deg); } }
    </style>
</head>
<body>

    <div id="intro-israel">
        <div class="intro-texto">Produzido por Israel</div>
        <div class="intro-sub">Salamaleiko</div>
    </div>

    <div id="efeito-derrota"><div class="deslike-mao">👎</div></div>

    <!-- POP-UP DE FIGURINHA GIGANTE NA TELA -->
    <div id="popup-carta-ganha">
        <div class="pop-card-moldura" id="pop-card-imagem"></div>
        <div class="pop-texto-alerta" id="pop-card-mensagem">TEXTO</div>
    </div>

    <div id="menu-inicial">
        <h1>Bafão no SESI</h1>
        
        <div class="secao-menu">
            <label>1. Escolha o Universo Temático:</label>
            <div class="grid-temas" id="container-temas"></div>
        </div>

        <!-- BOTÕES DE SELEÇÃO PRINCIPAIS -->
        <div class="secao-menu" style="margin-top: 15px;">
            <button class="btn-principal btn-bot" onclick="abrirSubPainel('bot')">X1 Contra o Bot</button>
            <button class="btn-principal btn-p2" onclick="abrirSubPainel('p2')">Jogadores (Local)</button>
        </div>

        <!-- SUB-PAINEL DO MODO BOT -->
        <div class="secao-menu painel-dinamico" id="painel-bot">
            <label>Quantidade de cartas na mesa:</label>
            <div id="cartas-bot-botoes" style="margin-bottom: 12px;">
                <button class="btn-config" onclick="mudarQtdCartas(10, this)">10</button>
                <button class="btn-config" onclick="mudarQtdCartas(20, this)">20</button>
                <button class="btn-config ativo" onclick="mudarQtdCartas(30, this)">30</button>
                <button class="btn-config" onclick="mudarQtdCartas(50, this)">50</button>
                <button class="btn-config" onclick="mudarQtdCartas(100, this)">100</button>
                <button class="btn-config" onclick="mudarQtdCartas(500, this)">500</button>
                <button class="btn-config" onclick="mudarQtdCartas(1000, this)">1000</button>
            </div>

            <label>Escolha seu oponente:</label>
            <button class="btn-config ativo" onclick="mudarDificuldade('facil', this)">Chocolate (Fácil)</button>
            <button class="btn-config" onclick="mudarDificuldade('medio', this)">Álvaro Lacerda (Médio)</button>
            <button class="btn-config" onclick="mudarDificuldade('dificil', this)">Saraiva (Difícil)</button>
            <br>
            <button class="btn-jogar-final" onclick="iniciarJogo('bot')">INICIAR DESAFIO</button>
        </div>

        <!-- SUB-PAINEL DO MODO MULTIPLAYER LOCAL -->
        <div class="secao-menu painel-dinamico" id="painel-local">
            <label>Quantidade de cartas na mesa:</label>
            <div id="cartas-local-botoes" style="margin-bottom: 12px;">
                <button class="btn-config" onclick="mudarQtdCartas(10, this)">10</button>
                <button class="btn-config" onclick="mudarQtdCartas(20, this)">20</button>
                <button class="btn-config ativo" onclick="mudarQtdCartas(30, this)">30</button>
                <button class="btn-config" onclick="mudarQtdCartas(50, this)">50</button>
                <button class="btn-config" onclick="mudarQtdCartas(100, this)">100</button>
                <button class="btn-config" onclick="mudarQtdCartas(500, this)">500</button>
                <button class="btn-config" onclick="mudarQtdCartas(1000, this)">1000</button>
            </div>

            <label>Quantas pessoas vão jogar?</label>
            <button class="btn-config ativo" onclick="mudarQtdPlayers(2, this)">2 Players</button>
            <button class="btn-config" onclick="mudarQtdPlayers(3, this)">3 Players</button>
            <button class="btn-config" onclick="mudarQtdPlayers(4, this)">4 Players</button>
            
            <label style="margin-top: 15px;">Digite o nome dos Craques:</label>
            <div class="container-inputs" id="inputs-nomes-jogadores">
                <!-- Gerado dinamicamente via JS -->
            </div>
            <button class="btn-jogar-final" onclick="iniciarJogo('p2')">COMEÇAR RODA DE BAFÃO</button>
        </div>
    </div>

    <div id="status-painel">
        <div id="vez-indicador">Carregando...</div>
        <div id="placar"></div>
        <div id="log-acao">Bata o bafão na hora certa!</div>
    </div>

    <div id="bolo-de-cartas"></div>

    <!-- BARRA COM CHANCES REAJUSTADAS -->
    <div id="container-barra">
        <div id="layout-barra">
            <div class="zona-vermelha"></div>
            <div class="zona-amarela"></div>
            <div class="zona-verde"></div>
            <div class="zona-roxa"></div>
            <div class="zona-verde"></div>
            <div class="zona-amarela"></div>
            <div class="zona-vermelha"></div>
        </div>
        <div id="bolinha-alvo"></div>
    </div>

    <div id="instrucao">Aperte em qualquer lugar para bater a mão!</div>

    <script>
        const BANCO_TEMAS = {
            copa: { 
                nome: "Figurinhas da Copa 🏆", 
                imgs: [
                    "https://upload.wikimedia.org/wikipedia/commons/5/5e/Pel%C3%A9_in_1958.jpg", 
                    "https://upload.wikimedia.org/wikipedia/commons/b/b8/Messvesmex-1520336217_%28cropped%29.jpg", 
                    "https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_WC2022_-_01_%28cropped%29.jpg", 
                    "https://upload.wikimedia.org/wikipedia/commons/e/e9/Kylian_Mbapp%C3%A9_World_Cup_2022_%28cropped%29.jpg" 
                ] 
            },
            pokemon: { 
                nome: "Pokémon TCG ⚡", 
                imgs: [
                    "https://images.pokemontcg.io/base1/4_hires.png",   
                    "https://images.pokemontcg.io/base1/58_hires.png",  
                    "https://images.pokemontcg.io/base1/2_hires.png",   
                    "https://images.pokemontcg.io/base1/15_hires.png"   
                ] 
            },
            naruto: { 
                nome: "Cards Anime / Naruto ☁️", 
                imgs: [
                    "https://images.pokemontcg.io/sm12/225_hires.png", 
                    "https://images.pokemontcg.io/swsh3/184_hires.png", 
                    "https://images.pokemontcg.io/swsh45/65_hires.png" 
                ] 
            },
            baralho: {
                nome: "Baralho Clássico 🃏",
                imgs: [
                    "https://upload.wikimedia.org/wikipedia/commons/2/25/Playing_card_spade_A.svg",
                    "https://upload.wikimedia.org/wikipedia/commons/f/f2/Playing_card_diamond_A.svg",
                    "https://upload.wikimedia.org/wikipedia/commons/6/6f/Playing_card_heart_A.svg"
                ]
            },
            carros: {
                nome: "Super Trunfo Carros 🏎️",
                imgs: [
                    "https://images.pokemontcg.io/xy12/103_hires.png", 
                    "https://images.pokemontcg.io/swsh7/193_hires.png"
                ]
            }
        };

        const imgGabrielzinhoErro = "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f62d.png";

        const intro = document.getElementById('intro-israel');
        const menu = document.getElementById('menu-inicial');
        const vezIndicador = document.getElementById('vez-indicador');
        const logAcao = document.getElementById('log-acao');
        const bolo = document.getElementById('bolo-de-cartas');
        const placarContainer = document.getElementById('placar');
        const telaDerrota = document.getElementById('efeito-derrota');
        const bolinha = document.getElementById('bolinha-alvo');
        const containerTemas = document.getElementById('container-temas');
        
        const painelBot = document.getElementById('painel-bot');
        const painelLocal = document.getElementById('painel-local');
        const containerInputs = document.getElementById('inputs-nomes-jogadores');

        const popupGanha = document.getElementById('popup-carta-ganha');
        const popCardImagem = document.getElementById('pop-card-imagem');
        const popCardMensagem = document.getElementById('pop-card-mensagem');

        let modoJogo = 'bot'; 
        let estampaAtual = 'copa'; 
        let maxCartasBolo = 30; 
        let dificuldadeBot = 'facil'; 
        let nomeBot = 'Chocolate';
        let qtdPlayersMax = 2; 
        let playerAtualIndex = 0; 
        
        let jogoAtActive = false;
        let bloqueioClique = false;

        let pontuacoes = []; 
        let nomesJogadores = []; 

        let bolinhaPos = 0;
        let bolinhaDirecao = 1;
        let velocidadeBolinha = 5.2; 
        let idAnimacaoBolinha;

        setTimeout(() => {
            intro.style.opacity = '0';
            setTimeout(() => intro.style.display = 'none', 800);
        }, 3000);

        Object.keys(BANCO_TEMAS).forEach((chave) => {
            const btn = document.createElement('button');
            btn.className = `btn-config ${chave === 'copa' ? 'ativo' : ''}`;
            btn.innerText = BANCO_TEMAS[chave].nome;
            btn.onclick = () => {
                estampaAtual = chave;
                containerTemas.querySelectorAll('.btn-config').forEach(b => b.classList.remove('ativo'));
                btn.classList.add('ativo');
            };
            containerTemas.appendChild(btn);
        });

        function mudarQtdCartas(qtd, botao) {
            maxCartasBolo = qtd;
            document.querySelectorAll('#cartas-bot-botoes .btn-config, #cartas-local-botoes .btn-config').forEach(b => {
                if(parseInt(b.innerText) === qtd) b.classList.add('ativo');
                else b.classList.remove('ativo');
            });
        }

        function abrirSubPainel(tipo) {
            painelBot.style.display = 'none';
            painelLocal.style.display = 'none';
            if(tipo === 'bot') painelBot.style.display = 'block';
            else { painelLocal.style.display = 'block'; renderizarCamposNomes(); }
        }

        function mudarDificuldade(dif, botao) {
            dificuldadeBot = dif;
            if(dif === 'facil') nomeBot = "Chocolate";
            else if(dif === 'medio') nomeBot = "Álvaro Lacerda";
            else if(dif === 'dificil') nomeBot = "Saraiva";
            botao.parentNode.querySelectorAll('.btn-config').forEach(b => b.classList.remove('ativo'));
            botao.classList.add('ativo');
        }

        function mudarQtdPlayers(qtd, botao) {
            qtdPlayersMax = qtd;
            botao.parentNode.querySelectorAll('.btn-config').forEach(b => b.classList.remove('ativo'));
            botao.classList.add('ativo');
            renderizarCamposNomes();
        }

        function renderizarCamposNomes() {
            containerInputs.innerHTML = '';
            for(let i = 1; i <= qtdPlayersMax; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'input-nome';
                input.placeholder = `Nome do Jogador ${i}`;
                input.id = `input-p${i}`;
                input.value = `Jogador ${i}`;
                containerInputs.appendChild(input);
            }
        }

        function iniciarJogo(modo) {
            modoJogo = modo;
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                jogoAtActive = true;
                bloqueioClique = false;
                configurarEstruturaPlacar();
                inicializarBolo();
                atualizarTurnoVisual();
                startBolinha();
            }, 500);
        }

        function configurarEstruturaPlacar() {
            placarContainer.innerHTML = '';
            pontuacoes = [];
            nomesJogadores = [];
            playerAtualIndex = 0;

            if (modoJogo === 'bot') {
                nomesJogadores = ["Você", nomeBot];
            } else {
                for (let i = 1; i <= qtdPlayersMax; i++) {
                    let nomeDigitado = document.getElementById(`input-p${i}`).value.trim();
                    if(nomeDigitado === "") nomeDigitado = `Jogador ${i}`;
                    nomesJogadores.push(nomeDigitado);
                }
            }

            nomesJogadores.forEach((nome, idx) => {
                pontuacoes.push(0);
                const span = document.createElement('span');
                span.className = `p-cor-${idx + 1}`;
                span.innerHTML = `${nome.toUpperCase()}: <span id="pts-p${idx}">${0}</span>`;
                placarContainer.appendChild(span);
            });
        }

        function inicializarBolo() {
            bolo.innerHTML = '';
            logAcao.innerText = `Bolo montado com ${maxCartasBolo} cartas!`;
            
            let espacamentoZ = 1.3;
            if(maxCartasBolo > 50) espacamentoZ = 0.4;
            if(maxCartasBolo > 100) espacamentoZ = 0.08;
            if(maxCartasBolo > 500) espacamentoZ = 0.03;

            let listaImagens = BANCO_TEMAS[estampaAtual].imgs;
            let limiteVisualParaRenderizar = Math.min(maxCartasBolo, 120);

            for (let i = 0; i < limiteVisualParaRenderizar; i++) {
                const carta = document.createElement('div');
                carta.classList.add('carta-container');
                let rotRandom = (Math.random() * 4 - 2).toFixed(2);
                let zTranslation = i * espacamentoZ; 
                carta.style.transform = `translateZ(${zTranslation}px) rotate(${rotRandom}deg)`;

                const frente = document.createElement('div');
                frente.classList.add('face', 'frente');
                
                let imgSorteada = listaImagens[Math.floor(Math.random() * listaImagens.length)];
                frente.style.backgroundImage = `url('${imgSorteada}')`;
                frente.dataset.imgUrl = imgSorteada; 

                if(estampaAtual === 'copa') {
                    frente.style.border = "3px solid #ffb703";
                    frente.style.boxShadow = "inset 0 0 15px rgba(255,183,3,0.4), 0 4px 8px rgba(0,0,0,0.5)";
                } else {
                    frente.style.border = "2px solid #fff";
                }

                const verso = document.createElement('div');
                verso.classList.add('face', 'verso');

                carta.appendChild(frente);
                carta.appendChild(verso);
                bolo.appendChild(carta);
            }
            bolo.dataset.cartasRestantes = maxCartasBolo;
        }

        function startBolinha() {
            if (!jogoAtActive) return;
            bolinhaPos += (velocidadeBolinha * bolinhaDirecao);
            if (bolinhaPos >= 304) { bolinhaPos = 304; bolinhaDirecao = -1; }
            else if (bolinhaPos <= 0) { bolinhaPos = 0; bolinhaDirecao = 1; }
            bolinha.style.left = bolinhaPos + 'px';
            idAnimacaoBolinha = requestAnimationFrame(startBolinha);
        }

        function atualizarTurnoVisual() {
            if (!jogoAtActive) return;
            let nomeDaVez = nomesJogadores[playerAtualIndex];
            vezIndicador.innerText = `Vez de: ${nomeDaVez}`;
            
            if (playerAtualIndex === 0) vezIndicador.style.color = "#00e5ff";
            else if (playerAtualIndex === 1) vezIndicador.style.color = "#e63946";
            else if (playerAtualIndex === 2) vezIndicador.style.color = "#ffb703";
            else vezIndicador.style.color = "#2ed573";
        }

        /* AJUSTADO: CHANCES SIGNIFICATIVAMENTE MAIORES DE ACERTAR O BAFÃO */
        function analisarResultadoBolinha(posicaoX) {
            let totalDisponivel = parseInt(bolo.dataset.cartasRestantes);
            let percentual = (posicaoX / 304) * 100;

            // Zona Roxa Expandida (Crítico - Israel)
            if (percentual >= 48.0 && percentual <= 52.0) {
                return { qtd: totalDisponivel, msg: "Você foi sensacional. Virou o bolo todo tá no nível de Israel.", cor: "#bd00ff", errou: false };
            }
            // Zona Verde Expandida (Muito bom - Saraiva)
            else if (percentual >= 38.0 && percentual <= 62.0) {
                let minVerde = Math.ceil(totalDisponivel * 0.45);
                let maxVerde = Math.ceil(totalDisponivel * 0.75);
                let viraMuitoAleatorio = Math.floor(Math.random() * (maxVerde - minVerde + 1)) + minVerde;
                if(viraMuitoAleatorio > totalDisponivel) viraMuitoAleatorio = totalDisponivel;
                if(viraMuitoAleatorio <= 0 && totalDisponivel > 0) viraMuitoAleatorio = 1;
                return { qtd: viraMuitoAleatorio, msg: "Você virou um tanto bom, está no nível do Saraiva", cor: "#2ed573", errou: false };
            }
            // Zona Amarela Expandida (Regular - Abraão)
            else if (percentual >= 20.0 && percentual <= 38.0 || percentual >= 62.0 && percentual <= 80.0) {
                let minAmarelo = Math.ceil(totalDisponivel * 0.15);
                let maxAmarelo = Math.ceil(totalDisponivel * 0.40);
                let viraPoucoAleatorio = Math.floor(Math.random() * (maxAmarelo - minAmarelo + 1)) + minAmarelo;
                if(viraPoucoAleatorio > totalDisponivel) viraPoucoAleatorio = totalDisponivel;
                if(viraPoucoAleatorio <= 0 && totalDisponivel > 0) viraPoucoAleatorio = 1;
                return { qtd: viraPoucoAleatorio, msg: "Você virou um pouco tá no nível do Abraão", cor: "#ffb703", errou: false };
            }
            // Zona Vermelha Reduzida (Erros raros)
            else {
                return { qtd: 0, msg: "Você não virou nada, tá igual Gabrielzinho", cor: "#e63946", errou: true };
            }
        }

        function virarCartas(quantidade, quemJogou, resultadoObjeto) {
            let totalDisponivel = parseInt(bolo.dataset.cartasRestantes);
            let cartasParaVirar = Math.min(quantidade, totalDisponivel);

            if (resultadoObjeto.errou) {
                popCardImagem.style.backgroundImage = `url('${imgGabrielzinhoErro}')`;
                popCardImagem.style.backgroundSize = "contain";
                popCardImagem.style.borderColor = resultadoObjeto.cor;
                popCardMensagem.innerText = `${quemJogou.toUpperCase()}:\n"${resultadoObjeto.msg}"`;
                popupGanha.classList.add('mostrar');

                setTimeout(() => {
                    popupGanha.classList.remove('mostrar');
                    logAcao.innerText = `${quemJogou} errou a batida.`;
                    setTimeout(() => { checarEstadoDoJogo(quemJogou); }, 400);
                }, 2000);
                return;
            }

            if (cartasParaVirar > 0) {
                let cartasVisuais = Array.from(bolo.children).filter(c => !c.classList.contains('jogada'));
                let urlImagemDaCarta = BANCO_TEMAS[estampaAtual].imgs[0];
                
                if(cartasVisuais.length > 0) {
                    urlImagemDaCarta = cartasVisuais[cartasVisuais.length - 1].querySelector('.frente').dataset.imgUrl;
                }

                popCardImagem.style.backgroundImage = `url('${urlImagemDaCarta}')`;
                popCardImagem.style.backgroundSize = "cover";
                popCardImagem.style.borderColor = resultadoObjeto.cor;
                popCardMensagem.innerText = `${quemJogou.toUpperCase()}:\n"${resultadoObjeto.msg}"\n(+${cartasParaVirar} cartas)`;
                popupGanha.classList.add('mostrar');

                pontuacoes[playerAtualIndex] += cartasParaVirar;
                document.getElementById(`pts-p${playerAtualIndex}`).innerText = pontuacoes[playerAtualIndex];

                let removerVisuais = Math.min(cartasParaVirar, cartasVisuais.length);
                for (let i = 0; i < removerVisuais; i++) {
                    let carta = cartasVisuais.pop();
                    if (carta) carta.classList.add('jogada');
                }

                bolo.dataset.cartasRestantes = totalDisponivel - cartasParaVirar;

                setTimeout(() => {
                    popupGanha.classList.remove('mostrar');
                    logAcao.innerText = `${quemJogou} coletou as cartas.`;
                    setTimeout(() => { checarEstadoDoJogo(quemJogou); }, 400);
                }, 2000);
            } else {
                setTimeout(() => { checarEstadoDoJogo(quemJogou); }, 400);
            }
        }

        function dispararConfetes() {
            const cores = ['#0066cc', '#00e5ff', '#2ed573', '#ffb703', '#e63946'];
            for (let i = 0; i < 100; i++) {
                const confete = document.createElement('div');
                confete.classList.add('confete');
                confete.style.left = Math.random() * 100 + 'vw';
                confete.style.background = cores[Math.floor(Math.random() * cores.length)];
                confete.style.transform = `scale(${Math.random() * 1.2})`;
                confete.style.animationDelay = Math.random() * 1.5 + 's';
                document.body.appendChild(confete);
                setTimeout(() => confete.remove(), 4000);
            }
        }

        function checarEstadoDoJogo(quemJogou) {
            let restantes = parseInt(bolo.dataset.cartasRestantes);

            if (restantes === 0) {
                jogoAtActive = false;
                cancelAnimationFrame(idAnimacaoBolinha);
                vezIndicador.innerText = "FIM DA BANCA!";
                vezIndicador.style.color = "#00e5ff";
                
                let maiorPontuacao = Math.max(...pontuacoes);
                let vencedorIndex = pontuacoes.indexOf(maiorPontuacao);
                let contagemEmpates = pontuacoes.filter(p => p === maiorPontuacao).length;

                if (contagemEmpates > 1) {
                    logAcao.innerHTML = `<strong style="color: #fff;">Empate técnico! Dividiram as figurinhas.</strong>`;
                } else if (modoJogo === 'bot' && vencedorIndex === 1) {
                    telaDerrota.classList.add('ativo');
                    logAcao.innerHTML = `<strong style="color: #e63946;">Você perdeu tudo para o ${nomeBot}!</strong>`;
                } else {
                    dispararConfetes();
                    logAcao.innerHTML = `<strong style="color: #00e5ff;">${nomesJogadores[vencedorIndex]} limpou a banca do SESI!</strong>`;
                }

                setTimeout(() => {
                    telaDerrota.classList.remove('ativo');
                    menu.style.display = 'flex';
                    menu.style.opacity = '1';
                    painelBot.style.display = 'none';
                    painelLocal.style.display = 'none';
                    logAcao.innerText = "Bata o bafão na hora certa!";
                    vezIndicador.innerText = "Carregando...";
                }, 4500);
                return;
            }

            if (modoJogo === 'bot') {
                if (playerAtualIndex === 0) {
                    playerAtualIndex = 1; 
                    atualizarTurnoVisual();
                    
                    setTimeout(() => {
                        if (!jogoAtActive) return;
                        
                        let posBotFake = 0;
                        let chanceX = Math.random() * 100;

                        if (dificuldadeBot === 'facil') {
                            if (chanceX < 60) posBotFake = Math.random() * 70; 
                            else if (chanceX < 90) posBotFake = 75 + Math.random() * 40; 
                            else posBotFake = 140 + Math.random() * 24; 
                        } 
                        else if (dificuldadeBot === 'medio') {
                            if (chanceX < 30) posBotFake = Math.random() * 90; 
                            else if (chanceX < 85) posBotFake = 136 + Math.random() * 32; 
                            else posBotFake = 100 + Math.random() * 30; 
                        } 
                        else {
                            if (chanceX < 5) posBotFake = 152; 
                            else if (chanceX < 92) posBotFake = 142 + Math.random() * 20; 
                            else posBotFake = 110 + Math.random() * 20; 
                        }

                        let resultadoBot = analisarResultadoBolinha(posBotFake);
                        virarCartas(resultadoBot.qtd, nomeBot, resultadoBot);
                    }, 1400);
                } else {
                    playerAtualIndex = 0; 
                    atualizarTurnoVisual();
                    bloqueioClique = false;
                }
            } else {
                playerAtualIndex = (playerAtualIndex + 1) % qtdPlayersMax;
                atualizarTurnoVisual();
                bloqueioClique = false;
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (!jogoAtActive || menu.contains(e.target) || intro.contains(e.target) || popupGanha.classList.contains('mostrar') || bloqueioClique) return;
            if (modoJogo === 'bot' && playerAtualIndex !== 0) return; 

            bloqueioClique = true; 
            let resultadoClique = analisarResultadoBolinha(bolinhaPos);
            let idQuemClicou = nomesJogadores[playerAtualIndex];
            virarCartas(resultadoClique.qtd, idQuemClicou, resultadoClique);
        });
    </script>
</body>
</html>
